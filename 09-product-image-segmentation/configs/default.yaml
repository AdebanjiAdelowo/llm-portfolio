pipeline:
  output_dir: outputs
  mask_threshold: 0.5
  refine: true

preprocessing:
  input_size: [512, 512]
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

postprocessing:
  min_component_area: 500
  close_kernel: 5
  smooth_sigma: 1.0

evaluation:
  threshold: 0.5
  metrics:
    - iou
    - dice
    - mad
    - mse
    - boundary_f1
    - grad
    - conn
